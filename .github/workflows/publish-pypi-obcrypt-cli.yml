name: Publish obcrypt-cli to PyPI

# Triggers on `obcrypt-cli-py/v*` tag pushes to this GitHub mirror.
# Builds the full wheel matrix (5 platforms + sdist) for the
# `obcrypt-cli-py/` package and publishes atomically to PyPI as
# `obcrypt-cli` via OIDC trusted publishing — no API token needed on
# the GitHub side.
#
# The wheel is bin-only: it ships the `obcrypt` Rust binary from
# the sibling `obcrypt-cli/` crate as a wheel scripts payload. The
# pyproject.toml at `obcrypt-cli-py/pyproject.toml` points maturin
# at `../obcrypt-cli/Cargo.toml` via `[tool.maturin] manifest-path`;
# the workflow just `cd`s into `obcrypt-cli-py/` and lets maturin
# pick that up.
#
# One-time setup required before the first publish:
#
# 1. On PyPI (https://pypi.org/manage/project/obcrypt-cli/settings/publishing/):
#    Add a Trusted Publisher with:
#      Owner:        deyanovich
#      Repository:   oboron-tools-rs
#      Workflow:     publish-pypi-obcrypt-cli.yml
#      Environment:  pypi
#
# 2. On GitHub (Settings → Environments on this repo):
#    Create an environment named `pypi`. Optional protection rules
#    (e.g. require approval for deployment) can be added there.
#
# Adapted from the working obcrypt-rs publish workflow
# (github.com/deyanovich/obcrypt-rs) — same matrix targets and OIDC
# trusted-publisher pattern that proved out in production for
# oboron-py and obcrypt-py.

on:
  push:
    tags:
      - "obcrypt-cli-py/v*"

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: obcrypt-cli-py
          target: ${{ matrix.target }}
          args: >-
            --release
            --strip
            --out dist
          manylinux: auto
          python-version: "3.12"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: obcrypt-cli-py/dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: obcrypt-cli-py
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: obcrypt-cli-py/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect dist files
        run: |
          mkdir dist
          find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
